<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      var temaSalvo = localStorage.getItem("tema");
      if (temaSalvo === "light" || temaSalvo === "dark") {
        document.documentElement.setAttribute("data-theme", temaSalvo);
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provérbios de Hoje</title>
  <meta name="description" content="Um versículo de Provérbios para cada dia do mês, com comentário reformado.">
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="pagina">
    <header class="cabecalho">
      <button class="botao-tema" id="botao-tema" type="button" aria-label="Alternar tema claro/escuro" aria-pressed="false">
        <svg class="icone-sol" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="4" fill="currentColor"></circle>
          <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="1.5" x2="12" y2="4"></line>
            <line x1="12" y1="20" x2="12" y2="22.5"></line>
            <line x1="1.5" y1="12" x2="4" y2="12"></line>
            <line x1="20" y1="12" x2="22.5" y2="12"></line>
            <line x1="4.5" y1="4.5" x2="6.2" y2="6.2"></line>
            <line x1="17.8" y1="17.8" x2="19.5" y2="19.5"></line>
            <line x1="4.5" y1="19.5" x2="6.2" y2="17.8"></line>
            <line x1="17.8" y1="6.2" x2="19.5" y2="4.5"></line>
          </g>
        </svg>
        <svg class="icone-lua" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
          <path
            fill="currentColor"
            d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5Z"
          ></path>
        </svg>
      </button>
      <p class="data" id="data-hoje"></p>
      <h1>Provérbios de Hoje</h1>
    </header>

    <section class="cartao">
      <p class="referencia" id="referencia"></p>
      <blockquote class="versiculo">
        <p id="versiculo-texto"></p>
      </blockquote>
    </section>

    <section class="comentario">
      <h2>Comentário</h2>
      <p class="comentario-autor" id="comentario-autor"></p>
      <p id="comentario-texto"></p>
    </section>

    <footer class="rodape">
      <p>
        Texto bíblico em domínio público (tradução de Almeida). Comentários adaptados e
        parafraseados a partir de temas conhecidos de comentaristas reformados
        (Matthew Henry, Charles Bridges, John Gill) &mdash; não são citações literais.
      </p>
    </footer>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
